<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entrar no OwlApp – Acesse seu painel de criador.">
    <meta name="theme-color" content="#7c3aed">
    <title>Entrar – OwlApp</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <a href="/" class="auth-logo-link">
                    <img src="/owlapp-logo.png" alt="OwlApp" class="auth-logo-img">
                </a>
                <h1 class="auth-title">Bem-vindo de volta</h1>
                <p class="auth-subtitle">Entre na sua conta para acessar o painel</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email</label>
                    <input
                        type="email"
                        id="loginEmail"
                        class="form-input"
                        placeholder="seu@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <div class="auth-label-row">
                        <label class="form-label" for="loginPassword">Senha</label>
                        <a href="#" id="btnForgotPassword" class="auth-forgot-link" onclick="LoginPage.showForgotPassword()">Esqueceu a senha?</a>
                    </div>
                    <div class="input-group">
                        <input
                            type="password"
                            id="loginPassword"
                            class="form-input"
                            placeholder="Sua senha"
                            required
                            autocomplete="current-password"
                            minlength="6"
                        >
                        <button type="button" class="input-group-btn" id="btnTogglePassword" onclick="LoginPage.togglePasswordVisibility('loginPassword', 'btnTogglePassword')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-gradient btn-lg auth-submit-btn" id="btnLogin" onclick="LoginPage.handleLogin()">
                    Entrar
                </button>
            </form>

            <!-- Forgot Password Form (hidden) -->
            <form id="forgotForm" class="auth-form" style="display:none;" onsubmit="return false;">
                <p class="auth-info-text">Informe seu email e enviaremos um link para redefinir sua senha.</p>
                <div class="form-group">
                    <label class="form-label" for="forgotEmail">Email</label>
                    <input
                        type="email"
                        id="forgotEmail"
                        class="form-input"
                        placeholder="seu@email.com"
                        required
                        autocomplete="email"
                    >
                </div>
                <button type="submit" class="btn btn-gradient btn-lg auth-submit-btn" id="btnForgot" onclick="LoginPage.handleForgotPassword()">
                    Enviar Link
                </button>
                <button type="button" class="btn btn-ghost btn-sm auth-back-btn" onclick="LoginPage.showLoginForm()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Voltar ao login
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Não tem uma conta? <a href="cadastro.html" class="auth-footer-link">Criar conta</a></p>
            </div>
        </div>

        <!-- Theme Toggle -->
        <button class="auth-theme-toggle btn btn-ghost btn-icon btn-sm" id="btnThemeToggleAuth" onclick="toggleTheme()" aria-label="Alternar tema">
            <span id="themeIconAuth"></span>
        </button>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
